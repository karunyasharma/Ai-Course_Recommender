<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Course Recommender</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:bold;
  background:rgba(0,0,0,0.3);
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}
.hero h1 { font-size:36px; }
.hero p { opacity:0.7; }

/* CHAT BUTTON */
.chat-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:26px;
}

/* CHAT BOX */
.chat-box {
  position:fixed;
  bottom:100px;
  right:20px;
  width:360px;
  height:520px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:15px;
  display:none;
  flex-direction:column;
}

/* CHAT BODY */
.chat-body {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MESSAGES */
.message {
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  max-width:75%;
}
.user {
  background:#0072ff;
  align-self:flex-end;
}
.bot {
  background:#333;
}

/* FOOTER */
.chat-footer {
  display:flex;
}
.chat-footer input {
  flex:1;
  padding:12px;
  border:none;
  outline:none;
}
.chat-footer button {
  padding:12px;
  border:none;
  background:#0072ff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🎓 AI Course Assistant</div>

<div class="hero">
  <h1>Find the Best Courses for You</h1>
  <p>Ask anything and get AI recommendations</p>
</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
  <div class="chat-body" id="chat"></div>

  <div class="chat-footer">
    <input id="input" placeholder="Ask about courses..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

// YOUR FLOWISE FUNCTION
async function query(data) {
    const response = await fetch(
        "https://cloud.flowiseai.com/api/v1/prediction/62831658-e1b5-4410-a99f-8b4a885d365b",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        }
    );
    return response.json();
}

// UI FUNCTIONS
function toggleChat(){
  const box=document.getElementById("chatBox");
  box.style.display = box.style.display==="flex" ? "none" : "flex";
}

function add(role,text){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="message "+role;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  add("user", text);
  input.value="";

  const loading = document.createElement("div");
  loading.className="message bot";
  loading.innerText="Typing...";
  document.getElementById("chat").appendChild(loading);

  try{
    const response = await query({ question: text });

    loading.remove();

    add("bot", response.text || "No response from AI");

  }catch(e){
    loading.innerText="Error connecting to server";
  }
}

// ENTER KEY SUPPORT
document.getElementById("input").addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
